name: Bug report
description: Something does not work as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, in which screen, with which keys?
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: e.g. v20.11.0
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Workforests version
      description: Output of `workforests --version`, or the version from package.json
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: git-version
    attributes:
      label: git version
      description: Output of `git --version`
      placeholder: e.g. git 2.44.0
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Error output, screenshots, or other context. Please redact absolute user paths and personal data.
