name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The interactive UI needs a real TTY and there is no test runner, so the
      # snapshot script (ink-testing-library) is the closest thing to a test: it
      # renders every screen with synthetic data and fails on a render error.
      - name: Render screen snapshots
        run: node --import tsx/esm scripts/snapshot.mjs
